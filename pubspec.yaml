name: antd_mobile_flutter
description: >
  Ant Design Mobile for Flutter — an internal UI component library inspired by
  ant-design-mobile (antd-mobile), providing fast, customizable, and atomic
  mobile UI components built on Flutter.
version: 0.1.0
homepage: https://github.com/your-org/antd_mobile_flutter

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  # No assets by default — add your own fonts/icons here
